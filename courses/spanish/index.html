<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FSI Spanish Basic Course - Study Companion</title>
<style>
:root {
  --bg: #0f1117;
  --surface: #1a1d27;
  --surface2: #242836;
  --border: #2e3345;
  --text: #e4e6ed;
  --text2: #9ca3b8;
  --accent: #6c8cff;
  --accent2: #4a6adf;
  --green: #4ade80;
  --red: #f87171;
  --orange: #fb923c;
  --yellow: #facc15;
}
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

/* Layout */
.app { display: flex; min-height: 100vh; }
.sidebar { width: 280px; background: var(--surface); border-right: 1px solid var(--border); overflow-y: auto; flex-shrink: 0; position: fixed; top: 0; left: 0; bottom: 0; z-index: 10; }
.main { flex: 1; margin-left: 280px; padding: 32px; max-width: 900px; }

/* Sidebar */
.sidebar-header { padding: 20px; border-bottom: 1px solid var(--border); }
.sidebar-header h1 { font-size: 16px; color: var(--accent); }
.sidebar-header p { font-size: 12px; color: var(--text2); margin-top: 4px; }
.back-link { display: block; padding: 10px 20px; font-size: 13px; color: var(--text2); text-decoration: none; border-bottom: 1px solid var(--border); transition: all 0.15s; }
.back-link:hover { background: var(--surface2); color: var(--text); }
.nav-section { padding: 12px 0; }
.nav-section-title { padding: 8px 20px; font-size: 11px; text-transform: uppercase; letter-spacing: 1px; color: var(--text2); font-weight: 600; cursor: pointer; display: flex; align-items: center; justify-content: space-between; }
.nav-section-title:hover { color: var(--text); }
.nav-section-title .arrow { font-size: 10px; transition: transform 0.2s; }
.nav-section-title .arrow.open { transform: rotate(90deg); }
.nav-items { overflow: hidden; }
.nav-items.collapsed { display: none; }
.nav-item { padding: 8px 20px 8px 32px; cursor: pointer; font-size: 13px; color: var(--text2); display: flex; align-items: center; gap: 8px; transition: all 0.15s; }
.nav-item:hover { background: var(--surface2); color: var(--text); }
.nav-item.active { background: var(--accent2); color: white; }
.nav-item .progress-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.nav-item .progress-dot.done { background: var(--green); }
.nav-item .progress-dot.partial { background: var(--orange); }
.nav-item .progress-dot.none { background: var(--border); }

/* Section headers */
h2 { font-size: 24px; margin-bottom: 8px; }
h3 { font-size: 18px; margin: 20px 0 12px; color: var(--text); }
.subtitle { color: var(--text2); font-size: 14px; margin-bottom: 24px; }

/* Audio Player */
.audio-section { margin-bottom: 32px; }
.unit-group { margin-bottom: 20px; background: var(--surface); border-radius: 8px; border: 1px solid var(--border); overflow: hidden; }
.unit-group-header { padding: 12px 16px; background: var(--surface2); font-weight: 600; font-size: 14px; display: flex; align-items: center; gap: 8px; cursor: pointer; }
.unit-group-header:hover { background: var(--border); }
.unit-group-header .chevron { font-size: 12px; transition: transform 0.2s; margin-left: auto; color: var(--text2); }
.unit-group-header .chevron.open { transform: rotate(90deg); }
.unit-group-body { padding: 8px; }
.audio-row { display: flex; align-items: center; gap: 12px; padding: 8px 12px; border-radius: 6px; transition: background 0.15s; }
.audio-row:hover { background: var(--surface2); }
.audio-label { font-size: 13px; color: var(--text2); min-width: 120px; }
audio { flex: 1; height: 32px; }
audio::-webkit-media-controls-panel { background: var(--surface2); }
.speed-control { display: flex; align-items: center; gap: 4px; }
.speed-btn { background: var(--surface2); border: 1px solid var(--border); color: var(--text2); padding: 2px 8px; border-radius: 4px; cursor: pointer; font-size: 12px; }
.speed-btn:hover, .speed-btn.active { background: var(--accent); color: white; border-color: var(--accent); }

/* Buttons */
.btn { padding: 8px 16px; border-radius: 6px; border: 1px solid var(--border); background: var(--surface); color: var(--text); cursor: pointer; font-size: 13px; transition: all 0.15s; }
.btn:hover { background: var(--surface2); }
.btn.primary { background: var(--accent); border-color: var(--accent); color: white; }
.btn.primary:hover { background: var(--accent2); }

/* Stats */
.stats-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 12px; margin-bottom: 24px; }
.stat-card { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 16px; }
.stat-value { font-size: 28px; font-weight: 700; color: var(--accent); }
.stat-label { font-size: 12px; color: var(--text2); margin-top: 4px; }

/* Progress bar */
.progress-bar { height: 6px; background: var(--surface2); border-radius: 3px; overflow: hidden; margin: 8px 0; }
.progress-fill { height: 100%; background: var(--accent); border-radius: 3px; transition: width 0.3s; }

/* PDF links */
.pdf-links { display: flex; gap: 8px; flex-wrap: wrap; margin: 16px 0; }
.pdf-link { display: flex; align-items: center; gap: 6px; padding: 10px 16px; background: var(--surface); border: 1px solid var(--border); border-radius: 8px; color: var(--text); text-decoration: none; font-size: 13px; transition: all 0.15s; }
.pdf-link:hover { background: var(--surface2); border-color: var(--accent); }
.pdf-icon { font-size: 18px; }

/* Study tip */
.study-tip { background: var(--surface); border-left: 3px solid var(--accent); padding: 12px 16px; margin: 12px 0; border-radius: 0 6px 6px 0; font-size: 14px; }
.study-tip strong { color: var(--accent); }

/* Dashboard */
.welcome-card { background: linear-gradient(135deg, #1e3a5f 0%, #2d1b4e 100%); border-radius: 12px; padding: 32px; margin-bottom: 24px; }
.welcome-card h2 { font-size: 28px; margin-bottom: 8px; }
.welcome-card p { color: var(--text2); }
.module-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 12px; }
.module-card { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 16px; cursor: pointer; transition: all 0.15s; }
.module-card:hover { border-color: var(--accent); transform: translateY(-1px); }
.module-card h3 { font-size: 15px; margin-bottom: 4px; }
.module-card p { font-size: 12px; color: var(--text2); }

/* Listened checkbox */
.listened-check { display: flex; align-items: center; gap: 6px; margin-left: auto; font-size: 12px; color: var(--text2); cursor: pointer; flex-shrink: 0; }
.listened-check input { cursor: pointer; accent-color: var(--accent); }
.listened-check.checked { color: var(--green); }

/* Responsive */
@media (max-width: 768px) {
  .sidebar { display: none; }
  .main { margin-left: 0; padding: 16px; }
}

/* Scrollbar */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: var(--bg); }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: var(--text2); }

.hidden { display: none !important; }

/* Sync UI */
.sync-bar { padding: 12px 20px; border-top: 1px solid var(--border); margin-top: auto; }
.sync-status { font-size: 11px; color: var(--text2); display: flex; align-items: center; gap: 6px; margin-bottom: 8px; }
.sync-dot { width: 6px; height: 6px; border-radius: 50%; }
.sync-dot.connected { background: var(--green); }
.sync-dot.disconnected { background: var(--red); }
.sync-dot.syncing { background: var(--yellow); animation: pulse 1s infinite; }
@keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.3; } }

/* Mobile hamburger */
.hamburger { display: none; position: fixed; top: 12px; left: 12px; z-index: 20; background: var(--surface); border: 1px solid var(--border); border-radius: 6px; padding: 8px 10px; color: var(--text); cursor: pointer; font-size: 18px; }
@media (max-width: 768px) {
  .hamburger { display: block; }
  .sidebar { transform: translateX(-100%); transition: transform 0.2s; }
  .sidebar.open { transform: translateX(0); display: block; }
  .main { padding-top: 52px; }
}
</style>

// STATE

let state = {
  currentView: 'dashboard',
  playbackRate: 1.0,
  studied: JSON.parse(localStorage.getItem('fsi-spanish-studied') || '{}'),
  srs: JSON.parse(localStorage.getItem('fsi-spanish-srs') || '{}')
};

function saveState() {
  localStorage.setItem('fsi-spanish-studied', JSON.stringify(state.studied));
  localStorage.setItem('fsi-spanish-srs', JSON.stringify(state.srs));
  debouncedSync();
}

// ============================================================
// ACCOUNT & CLOUD SYNC
// ============================================================
const SYNC_URL = 'https://fsi-sync.zackwilson21.workers.dev';
let syncTimer = null;

function getAccount() {
  const acct = localStorage.getItem('fsi-account');
  return acct ? JSON.parse(acct) : null;
}

function isLoggedIn() { return !!getAccount(); }

function debouncedSync() {
  if (!isLoggedIn()) return;
  clearTimeout(syncTimer);
  syncTimer = setTimeout(() => cloudPush(), 2000);
}

async function cloudPush() {
  const acct = getAccount();
  if (!acct) return;
  updateAccountBar('syncing');
  try {
    const resp = await fetch(SYNC_URL, {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ code: acct.key, course: 'spanish', srs: state.srs, studied: state.studied })
    });
    updateAccountBar(resp.ok ? 'connected' : 'error');
  } catch (e) {
    updateAccountBar('offline');
  }
}

async function cloudPull() {
  const acct = getAccount();
  if (!acct) return;
  updateAccountBar('syncing');
  try {
    const resp = await fetch(SYNC_URL + '?code=' + encodeURIComponent(acct.key) + '&course=spanish');
    if (resp.ok) {
      const data = await resp.json();
      if (data && data.srs) {
        for (const [key, remote] of Object.entries(data.srs)) {
          const local = state.srs[key];
          if (!local || remote.correct > local.correct || (remote.correct === local.correct && remote.next > local.next)) {
            state.srs[key] = remote;
          }
        }
        if (data.studied) Object.assign(state.studied, data.studied);
        localStorage.setItem('fsi-spanish-studied', JSON.stringify(state.studied));
        localStorage.setItem('fsi-spanish-srs', JSON.stringify(state.srs));
        render();
      }
      updateAccountBar('connected');
    } else {
      updateAccountBar('connected');
    }
  } catch (e) {
    updateAccountBar('offline');
  }
}

function doLogout() {
  localStorage.removeItem('fsi-account');
  window.location.href = '../../index.html';
}

function updateAccountBar(status) {
  const dot = document.getElementById('sync-dot');
  const txt = document.getElementById('sync-status-text');
  if (!dot || !txt) return;
  const labels = { syncing: 'Syncing...', connected: 'Synced', error: 'Sync failed', offline: 'Offline' };
  dot.className = 'sync-dot ' + (status === 'syncing' ? 'syncing' : status === 'connected' ? 'connected' : 'disconnected');
  txt.textContent = labels[status] || status;
}

function renderAccountBar() {
  const bar = document.getElementById('account-bar');
  if (!bar) return;
  const acct = getAccount();
  if (acct) {
    bar.innerHTML = `
      <div class="sync-status">
        <span class="sync-dot connected" id="sync-dot"></span>
        <span id="sync-status-text">Synced</span>
      </div>
      <div style="font-size:13px;color:var(--text);margin-bottom:8px">Logged in as <strong>${acct.username}</strong></div>
      <button class="btn" style="width:100%;font-size:12px" onclick="doLogout()">Log Out</button>`;
  } else {
    bar.innerHTML = `<div style="font-size:13px;color:var(--text2)">Not logged in</div>`;
  }
}

// ============================================================
// HELPERS
// ============================================================

// Build audio file path for Volumes 1-3
function getAudioPath(vol, unit, part) {
  const unitStr = unit.toString().padStart(2, '0');
  if (vol === 1) {
    if (unit <= 5) {
      // Fsi-SpanishBasicCourse-Volume1-Unit01a.mp3
      return `Volume 1/Fsi-SpanishBasicCourse-Volume1-Unit${unitStr}${part.toLowerCase()}.mp3`;
    } else {
      // FSI - Spanish Basic Course - Volume 1 - Unit 06A.mp3
      return `Volume 1/FSI - Spanish Basic Course - Volume 1 - Unit ${unitStr}${part.toUpperCase()}.mp3`;
    }
  } else if (vol === 2) {
    return `Volume 2/FSI - Spanish Basic Course - Volume 2 - Unit ${unitStr}${part.toUpperCase()}.mp3`;
  } else if (vol === 3) {
    return `Volume 3/FSI - Spanish Basic Course - Volume 3 - Unit ${unitStr}${part.toUpperCase()}.mp3`;
  }
  return '';
}

// Get parts for a unit in volumes 1-3
function getUnitParts(vol, unit) {
  const parts = ['A', 'B'];
  const v = VOLUMES[vol];
  if (v && v.cParts && v.cParts[unit]) {
    parts.push('C');
  }
  return parts;
}

// Get the "studied" key for a unit
function getStudiedKey(vol, unit) {
  return `v${vol}-u${unit}`;
}

function isStudied(vol, unit) {
  return !!state.studied[getStudiedKey(vol, unit)];
}

function toggleStudied(vol, unit) {
  const key = getStudiedKey(vol, unit);
  if (state.studied[key]) {
    delete state.studied[key];
  } else {
    state.studied[key] = Date.now();
  }
  saveState();
  updateProgressDots();
}

function getVolumeProgress(vol) {
  const v = VOLUMES[vol];
  if (!v) return 0;
  let studied = 0;
  v.units.forEach(u => {
    if (isStudied(vol, u)) studied++;
  });
  return Math.round((studied / v.units.length) * 100);
}

function getTotalProgress() {
  let total = 0, studied = 0;
  for (let vol = 1; vol <= 4; vol++) {
    VOLUMES[vol].units.forEach(u => {
      total++;
      if (isStudied(vol, u)) studied++;
    });
  }
  return { total, studied, pct: total > 0 ? Math.round((studied / total) * 100) : 0 };
}

// Extract display label from Vol4 section string (remove the leading number prefix like "46.1 ")
function getTrackLabel(section) {
  // Remove leading unit-number prefix like "46.1 ", "46.21.1 ", etc.
  return section.replace(/^\d+\.\d+(\.\d+)*\s*/, '');
}

// ============================================================
// SIDEBAR NAV
// ============================================================
function buildSidebarNav() {
  for (let vol = 1; vol <= 4; vol++) {
    const container = document.getElementById(`nav-vol${vol}-items`);
    if (!container) continue;
    let html = '';
    VOLUMES[vol].units.forEach(u => {
      const key = getStudiedKey(vol, u);
      const dotClass = state.studied[key] ? 'done' : 'none';
      html += `<div class="nav-item" data-view="unit-${vol}-${u}"><span class="progress-dot ${dotClass}"></span> Unit ${u}</div>`;
    });
    container.innerHTML = html;
  }

  // Attach click handlers
  document.querySelectorAll('.nav-item[data-view]').forEach(el => {
    el.addEventListener('click', () => navigate(el.dataset.view));
  });
}

function toggleNavSection(id) {
  const items = document.getElementById(id + '-items');
  const arrow = document.querySelector(`#${id} .arrow`);
  if (items) items.classList.toggle('collapsed');
  if (arrow) arrow.classList.toggle('open');
}

// ============================================================
// RENDERING
// ============================================================
function render() {
  const main = document.getElementById('main-content');
  const view = state.currentView;

  // Update sidebar active state
  document.querySelectorAll('.nav-item').forEach(el => {
    el.classList.toggle('active', el.dataset.view === view);
  });

  updateProgressDots();

  if (view === 'dashboard') {
    renderDashboard(main);
  } else if (view.startsWith('unit-')) {
    const parts = view.split('-');
    const vol = parseInt(parts[1]);
    const unit = parseInt(parts[2]);
    if (vol === 4) {
      renderVol4Unit(main, unit);
    } else {
      renderUnit(main, vol, unit);
    }
  }
}

function updateProgressDots() {
  document.querySelectorAll('.nav-item[data-view]').forEach(el => {
    const view = el.dataset.view;
    const dot = el.querySelector('.progress-dot');
    if (!dot || !view.startsWith('unit-')) return;
    const parts = view.split('-');
    const vol = parseInt(parts[1]);
    const unit = parseInt(parts[2]);
    const studied = isStudied(vol, unit);
    dot.className = 'progress-dot ' + (studied ? 'done' : 'none');
  });
}

function renderDashboard(el) {
  const progress = getTotalProgress();
  const totalTracks = countAllTracks();

  el.innerHTML = `
    <div class="welcome-card">
      <h2>FSI Spanish Basic Course</h2>
      <p>A comprehensive Spanish language course developed by the Foreign Service Institute. Work through the 4 volumes sequentially, starting with Volume 1.</p>
    </div>
    <div class="stats-grid">
      <div class="stat-card">
        <div class="stat-value">55</div>
        <div class="stat-label">Total Units</div>
      </div>
      <div class="stat-card">
        <div class="stat-value">${progress.studied}</div>
        <div class="stat-label">Units Studied</div>
      </div>
      <div class="stat-card">
        <div class="stat-value">${progress.pct}%</div>
        <div class="stat-label">Overall Progress</div>
      </div>
      <div class="stat-card">
        <div class="stat-value">${totalTracks}</div>
        <div class="stat-label">Audio Tracks</div>
      </div>
    </div>
    <h3>Volumes</h3>
    <div class="module-grid">
      ${[1,2,3,4].map(vol => {
        const v = VOLUMES[vol];
        const pct = getVolumeProgress(vol);
        const unitRange = `Units ${v.units[0]}-${v.units[v.units.length-1]}`;
        return `<div class="module-card" onclick="navigate('unit-${vol}-${v.units[0]}')">
          <h3>${v.name}</h3>
          <p>${unitRange} &middot; ${v.units.length} units</p>
          <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
          <p style="font-size:11px;color:var(--text2)">${pct}% complete</p>
        </div>`;
      }).join('')}
    </div>
    <div class="study-tip" style="margin-top:24px"><strong>Tip:</strong> Each unit has Part A and Part B audio tracks. Listen to Part A first to learn the material, then use Part B for drills and practice. Mark units as "listened" to track your progress.</div>
  `;
}

function countAllTracks() {
  let count = 0;
  // Volumes 1-3: each unit has A, B, and some have C
  for (let vol = 1; vol <= 3; vol++) {
    VOLUMES[vol].units.forEach(u => {
      count += getUnitParts(vol, u).length;
    });
  }
  // Volume 4: count from track data
  for (const unit of VOLUMES[4].units) {
    if (VOL4_TRACKS[unit]) count += VOL4_TRACKS[unit].length;
  }
  return count;
}

function renderUnit(el, vol, unit) {
  const v = VOLUMES[vol];
  const parts = getUnitParts(vol, unit);
  const studied = isStudied(vol, unit);
  const unitStr = unit.toString().padStart(2, '0');

  // Navigation: prev/next unit
  const allUnits = [];
  for (let vi = 1; vi <= 4; vi++) VOLUMES[vi].units.forEach(u => allUnits.push({ vol: vi, unit: u }));
  const idx = allUnits.findIndex(x => x.vol === vol && x.unit === unit);
  const prev = idx > 0 ? allUnits[idx - 1] : null;
  const next = idx < allUnits.length - 1 ? allUnits[idx + 1] : null;

  el.innerHTML = `
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px">
      <h2>Unit ${unit}</h2>
      <label class="listened-check ${studied ? 'checked' : ''}" onclick="toggleStudied(${vol}, ${unit}); render();">
        <input type="checkbox" ${studied ? 'checked' : ''} onclick="event.stopPropagation(); toggleStudied(${vol}, ${unit}); render();">
        ${studied ? 'Studied' : 'Mark as studied'}
      </label>
    </div>
    <p class="subtitle">${v.name} &middot; Unit ${unitStr}</p>
    <div class="pdf-links">
      <a class="pdf-link" href="${encodeURI(v.folder + '/' + v.pdf)}" target="_blank">
        <span class="pdf-icon">&#128196;</span> ${v.name} Student Text (PDF)
      </a>
    </div>
    <div class="speed-control" style="margin-bottom:16px">
      <span style="font-size:13px;color:var(--text2)">Playback speed:</span>
      ${[0.5, 0.75, 1, 1.25, 1.5].map(s => `<button class="speed-btn ${state.playbackRate===s?'active':''}" onclick="setSpeed(${s})">${s}x</button>`).join('')}
    </div>
    <div class="unit-group">
      <div class="unit-group-header" onclick="toggleGroup(this)">
        <span>Unit ${unit} Audio</span>
        <span class="chevron open">&#9654;</span>
      </div>
      <div class="unit-group-body">
        ${parts.map(p => `
          <div class="audio-row">
            <span class="audio-label">Part ${p}</span>
            <audio controls preload="none" src="${encodeURI(getAudioPath(vol, unit, p))}"></audio>
          </div>
        `).join('')}
      </div>
    </div>
    <div style="display:flex;justify-content:space-between;margin-top:24px">
      ${prev ? `<button class="btn" onclick="navigate('unit-${prev.vol}-${prev.unit}')">&larr; Unit ${prev.unit}</button>` : '<span></span>'}
      ${next ? `<button class="btn" onclick="navigate('unit-${next.vol}-${next.unit}')">Unit ${next.unit} &rarr;</button>` : '<span></span>'}
    </div>
  `;
}

function renderVol4Unit(el, unit) {
  const v = VOLUMES[4];
  const tracks = VOL4_TRACKS[unit] || [];
  const studied = isStudied(4, unit);
  const unitStr = unit.toString().padStart(2, '0');

  // Navigation
  const allUnits = [];
  for (let vi = 1; vi <= 4; vi++) VOLUMES[vi].units.forEach(u => allUnits.push({ vol: vi, unit: u }));
  const idx = allUnits.findIndex(x => x.vol === 4 && x.unit === unit);
  const prev = idx > 0 ? allUnits[idx - 1] : null;
  const next = idx < allUnits.length - 1 ? allUnits[idx + 1] : null;

  el.innerHTML = `
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px">
      <h2>Unit ${unit}</h2>
      <label class="listened-check ${studied ? 'checked' : ''}" onclick="toggleStudied(4, ${unit}); render();">
        <input type="checkbox" ${studied ? 'checked' : ''} onclick="event.stopPropagation(); toggleStudied(4, ${unit}); render();">
        ${studied ? 'Studied' : 'Mark as studied'}
      </label>
    </div>
    <p class="subtitle">Volume 4 &middot; Unit ${unitStr} &middot; ${tracks.length} tracks</p>
    <div class="pdf-links">
      <a class="pdf-link" href="${encodeURI(v.folder + '/' + v.pdf)}" target="_blank">
        <span class="pdf-icon">&#128196;</span> Volume 4 Student Text (PDF)
      </a>
    </div>
    <div class="speed-control" style="margin-bottom:16px">
      <span style="font-size:13px;color:var(--text2)">Playback speed:</span>
      ${[0.5, 0.75, 1, 1.25, 1.5].map(s => `<button class="speed-btn ${state.playbackRate===s?'active':''}" onclick="setSpeed(${s})">${s}x</button>`).join('')}
    </div>
    <div class="unit-group">
      <div class="unit-group-header" onclick="toggleGroup(this)">
        <span>Unit ${unit} Tracks (${tracks.length})</span>
        <span class="chevron open">&#9654;</span>
      </div>
      <div class="unit-group-body">
        ${tracks.map(([trackId, section]) => {
          const fileName = `${trackId} FSI - Spanish Basic Course - Volume 4 - Unit ${unitStr} - ${section}.mp3`;
          const label = getTrackLabel(section);
          return `<div class="audio-row">
            <span class="audio-label" style="min-width:200px">${label}</span>
            <audio controls preload="none" src="${encodeURI('Volume 4/' + fileName)}"></audio>
          </div>`;
        }).join('')}
      </div>
    </div>
    <div style="display:flex;justify-content:space-between;margin-top:24px">
      ${prev ? `<button class="btn" onclick="navigate('unit-${prev.vol}-${prev.unit}')">&larr; Unit ${prev.unit}</button>` : '<span></span>'}
      ${next ? `<button class="btn" onclick="navigate('unit-${next.vol}-${next.unit}')">Unit ${next.unit} &rarr;</button>` : '<span></span>'}
    </div>
  `;
}

// ============================================================
// INTERACTION HANDLERS
// ============================================================
function navigate(view) {
  state.currentView = view;
  render();
  window.scrollTo(0, 0);
  // On mobile, close sidebar
  document.getElementById('sidebar').classList.remove('open');
}

function setSpeed(rate) {
  state.playbackRate = rate;
  document.querySelectorAll('audio').forEach(a => a.playbackRate = rate);
  document.querySelectorAll('.speed-btn').forEach(b => {
    b.classList.toggle('active', parseFloat(b.textContent) === rate);
  });
}

function toggleGroup(header) {
  const body = header.nextElementSibling;
  const chevron = header.querySelector('.chevron');
  if (body) body.classList.toggle('hidden');
  if (chevron) chevron.classList.toggle('open');
}

// Set playback rate on audio play
document.addEventListener('play', e => {
  if (e.target.tagName === 'AUDIO') e.target.playbackRate = state.playbackRate;
}, true);

// ============================================================
// INIT
// ============================================================
buildSidebarNav();
renderAccountBar();
if (isLoggedIn()) {
  setTimeout(() => cloudPull(), 500);
}
render();
</script>
</body>
</html>
