<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FSI Language Courses</title>
<style>
:root {
  --bg: #0f1117;
  --surface: #1a1d27;
  --surface2: #242836;
  --border: #2e3345;
  --text: #e4e6ed;
  --text2: #9ca3b8;
  --accent: #6c8cff;
  --accent2: #4a6adf;
  --green: #4ade80;
  --red: #f87171;
  --orange: #fb923c;
  --yellow: #facc15;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
}

/* Top bar */
.top-bar {
  display: flex;
  align-items: center;
  justify-content: flex-end;
  padding: 16px 32px;
  border-bottom: 1px solid var(--border);
  background: var(--surface);
  gap: 12px;
}
.top-bar .username {
  font-size: 14px;
  color: var(--text2);
}
.top-bar .username strong {
  color: var(--text);
}

/* Centered container */
.container {
  max-width: 720px;
  margin: 0 auto;
  padding: 48px 24px;
}

/* Login screen */
.login-screen {
  display: flex;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  padding: 24px;
}
.login-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 32px;
  width: 100%;
  max-width: 400px;
}
.login-card h1 {
  font-size: 24px;
  margin-bottom: 4px;
  color: var(--text);
}
.login-card .subtitle {
  font-size: 14px;
  color: var(--text2);
  margin-bottom: 24px;
  line-height: 1.5;
}
.login-card label {
  font-size: 13px;
  color: var(--text2);
  display: block;
  margin-bottom: 6px;
  margin-top: 16px;
}
.login-card label:first-of-type {
  margin-top: 0;
}
.login-card input {
  width: 100%;
  padding: 10px 14px;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 6px;
  color: var(--text);
  font-size: 14px;
  transition: border-color 0.15s;
}
.login-card input:focus {
  outline: none;
  border-color: var(--accent);
}
.login-error {
  color: var(--red);
  font-size: 12px;
  min-height: 18px;
  margin-top: 8px;
}
.btn {
  padding: 10px 20px;
  border-radius: 6px;
  border: 1px solid var(--border);
  background: var(--surface);
  color: var(--text);
  cursor: pointer;
  font-size: 14px;
  transition: all 0.15s;
}
.btn:hover {
  background: var(--surface2);
}
.btn.primary {
  background: var(--accent);
  border-color: var(--accent);
  color: white;
  width: 100%;
  margin-top: 8px;
  font-weight: 600;
}
.btn.primary:hover {
  background: var(--accent2);
}
.btn.small {
  padding: 6px 14px;
  font-size: 13px;
}

/* Course selection page */
.page-header {
  text-align: center;
  margin-bottom: 40px;
}
.page-header h1 {
  font-size: 32px;
  margin-bottom: 8px;
}
.page-header p {
  font-size: 16px;
  color: var(--text2);
  line-height: 1.5;
}

.courses-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 24px;
}

.course-card {
  border-radius: 12px;
  padding: 32px;
  text-decoration: none;
  color: var(--text);
  display: flex;
  flex-direction: column;
  transition: transform 0.2s, box-shadow 0.2s;
  cursor: pointer;
  position: relative;
  overflow: hidden;
  min-height: 240px;
}
.course-card:hover {
  transform: translateY(-4px);
  box-shadow: 0 12px 40px rgba(0,0,0,0.4);
}
.course-card::before {
  content: '';
  position: absolute;
  inset: 0;
  border-radius: 12px;
  border: 1px solid rgba(255,255,255,0.08);
  pointer-events: none;
}
.course-card.chinese {
  background: linear-gradient(135deg, #1e3a5f 0%, #2d1b4e 100%);
}
.course-card.spanish {
  background: linear-gradient(135deg, #3b1f1f 0%, #4a2c0a 100%);
}

.course-card .course-icon {
  font-size: 40px;
  margin-bottom: 16px;
  width: 56px;
  height: 56px;
  display: flex;
  align-items: center;
  justify-content: center;
  background: rgba(255,255,255,0.08);
  border-radius: 12px;
}
.course-card h2 {
  font-size: 22px;
  margin-bottom: 10px;
  line-height: 1.3;
}
.course-card .course-desc {
  font-size: 14px;
  color: var(--text2);
  line-height: 1.6;
  flex: 1;
  margin-bottom: 16px;
}
.course-card .course-meta {
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 13px;
  color: var(--text2);
}
.course-card .course-meta .dot {
  width: 4px;
  height: 4px;
  border-radius: 50%;
  background: var(--text2);
}

/* Responsive */
@media (max-width: 640px) {
  .courses-grid {
    grid-template-columns: 1fr;
  }
  .container {
    padding: 32px 16px;
  }
  .top-bar {
    padding: 12px 16px;
  }
  .page-header h1 {
    font-size: 26px;
  }
}
</style>
</head>
<body>

<div id="app"></div>

<script>
// --- Auth ---
async function hashCredentials(username, password) {
  const data = new TextEncoder().encode(username.toLowerCase().trim() + ':' + password);
  const hash = await crypto.subtle.digest('SHA-256', data);
  return Array.from(new Uint8Array(hash)).map(b => b.toString(16).padStart(2,'0')).join('');
}

function getAccount() {
  const acct = localStorage.getItem('fsi-account');
  return acct ? JSON.parse(acct) : null;
}

function isLoggedIn() {
  return !!getAccount();
}

// --- Render ---
function render() {
  const app = document.getElementById('app');
  if (isLoggedIn()) {
    renderCourseSelection(app);
  } else {
    renderLogin(app);
  }
}

function renderLogin(app) {
  app.innerHTML = `
    <div class="login-screen">
      <div class="login-card">
        <h1>FSI Language Courses</h1>
        <div class="subtitle">Log in to access course materials and sync your progress across devices.</div>
        <label for="login-user">Username</label>
        <input id="login-user" type="text" placeholder="Enter username" autocomplete="username">
        <label for="login-pass">Password</label>
        <input id="login-pass" type="password" placeholder="Enter password" autocomplete="current-password">
        <div class="login-error" id="login-error"></div>
        <button class="btn primary" id="login-btn">Log In / Sign Up</button>
      </div>
    </div>`;

  document.getElementById('login-btn').addEventListener('click', doLogin);
  document.getElementById('login-pass').addEventListener('keydown', e => {
    if (e.key === 'Enter') doLogin();
  });
  document.getElementById('login-user').addEventListener('keydown', e => {
    if (e.key === 'Enter') document.getElementById('login-pass').focus();
  });
  document.getElementById('login-user').focus();
}

function renderCourseSelection(app) {
  const acct = getAccount();
  app.innerHTML = `
    <div class="top-bar">
      <span class="username">Logged in as <strong>${acct.username}</strong></span>
      <button class="btn small" id="logout-btn">Log Out</button>
    </div>
    <div class="container">
      <div class="page-header">
        <h1>FSI Language Courses</h1>
        <p>Study materials from the Foreign Service Institute, designed for US government personnel learning languages for diplomatic service.</p>
      </div>
      <div class="courses-grid">
        <a href="courses/chinese/index.html" class="course-card chinese">
          <div class="course-icon">&#x4E2D;</div>
          <h2>FSI Standard Chinese</h2>
          <div class="course-desc">A comprehensive Mandarin Chinese course covering pronunciation, vocabulary, and conversation across 4 volumes and 10+ modules.</div>
          <div class="course-meta">
            <span>309 audio lessons</span>
            <span class="dot"></span>
            <span>4 volumes</span>
          </div>
        </a>
        <a href="courses/spanish/index.html" class="course-card spanish">
          <div class="course-icon">&#xD1;</div>
          <h2>FSI Spanish Basic Course</h2>
          <div class="course-desc">The classic FSI Spanish Basic Course with structured drills, dialogues, and comprehensive grammar coverage for beginners.</div>
          <div class="course-meta">
            <span>237 audio lessons</span>
            <span class="dot"></span>
            <span>55 units</span>
          </div>
        </a>
      </div>
    </div>`;

  document.getElementById('logout-btn').addEventListener('click', doLogout);
}

async function doLogin() {
  const user = document.getElementById('login-user').value.trim();
  const pass = document.getElementById('login-pass').value;
  const err = document.getElementById('login-error');

  if (!user || !pass) {
    err.textContent = 'Please enter both username and password.';
    return;
  }
  if (pass.length < 4) {
    err.textContent = 'Password must be at least 4 characters.';
    return;
  }
  err.textContent = '';

  const key = await hashCredentials(user, pass);
  localStorage.setItem('fsi-account', JSON.stringify({ username: user, key }));
  render();
}

function doLogout() {
  localStorage.removeItem('fsi-account');
  render();
}

// --- Init ---
render();
</script>
</body>
</html>
